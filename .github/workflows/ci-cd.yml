name: Build and Deploy

on:
  push:
    branches: [ "main" ] 

jobs:
  ci-pipeline:
    runs-on: ubuntu-latest
    steps:
    - name: Check out code
      uses: actions/checkout@v4

    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Build and Push Docker Image
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: ${{ secrets.DOCKERHUB_USERNAME }}/my-node-app:${{ github.sha }}

    - name: Check out GitOps Repo
      uses: actions/checkout@v4
      with:
        repository: '${{ github.repository_owner }}/my-app-gitops'
        token: ${{ secrets.GITOPS_TOKEN }}
        path: gitops-repo

    - name: Update Image Tag in Manifest
      run: |
        cd gitops-repo
        sed -i "s|image: .*|image: ${{ secrets.DOCKERHUB_USERNAME }}/my-node-app:${{ github.sha }}|g" deployment.yaml
        
        git config --global user.name "github-actions"
        git config --global user.email "actions@github.com"
        git add deployment.yaml
        git commit -m "Deploy version ${{ github.sha }} [skip ci]"
        git push origin main
